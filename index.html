<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SplitKick+</title>
  <style>
    /* Solid colors only — no gradients anywhere (see docs/claude.md). */
    :root {
      --bg: #0b0b0b;
      --surface: #161616;
      --text: #f2f2f2;
      --muted: #8a8a8a;
      --accent: #00b341;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      -webkit-app-region: drag;
    }
    h1 { margin: 0; font-size: 28px; letter-spacing: -0.5px; }
    h1 span { color: var(--accent); }
    .tag {
      background: var(--surface);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
    }
    .phase { color: var(--accent); font-size: 13px; }
  </style>
</head>
<body>
  <h1>SplitKick<span>+</span></h1>
  <div class="tag">Offline-first splitting · self-custodial USD₮ settlement</div>
  <div class="phase" id="status">Phase 0 — scaffold</div>
  <script type="module" src="./src/ui/app.js"></script>
</body>
</html>
