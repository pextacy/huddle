# Dependabot keeps dependencies patched and opens PRs for security advisories.
# Covers both npm workspaces (backend root + Next.js frontend) and the CI actions.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      backend-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      frontend-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
